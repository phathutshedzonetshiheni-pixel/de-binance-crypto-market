name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
      HAS_DBT_CREDENTIALS: ${{ secrets.GCP_PROJECT_ID != '' && secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare virtual environment for Make targets
        run: make setup

      - name: Lint/syntax check
        run: make lint

      - name: Run tests
        run: make test

      - name: dbt parse check (credential-safe)
        shell: bash
        run: |
          if [ -f transform/dbt_project.yml ]; then
            mkdir -p .ci/dbt
            python -c "from pathlib import Path; Path('.ci/dbt/profiles.yml').write_text('''crypto_market_project:\n  target: ci\n  outputs:\n    ci:\n      type: bigquery\n      method: oauth\n      project: ci-dummy-project\n      dataset: ci_dbt_parse\n      location: US\n      threads: 1\n''', encoding='utf-8')"
            dbt parse --project-dir transform --profiles-dir .ci/dbt
          else
            echo "No dbt project found at transform/dbt_project.yml; skipping dbt parse."
          fi

      - name: Write service account JSON to disk for dbt
        if: env.HAS_DBT_CREDENTIALS == 'true'
        shell: bash
        run: |
          SA_FILE="${RUNNER_TEMP:-/tmp}/dbt-gcp-sa.json"
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$SA_FILE"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$SA_FILE" >> "$GITHUB_ENV"

      - name: Prepare credentialed dbt profile
        if: env.HAS_DBT_CREDENTIALS == 'true'
        shell: bash
        run: |
          if [ ! -f transform/profiles.yml ] && [ -f transform/profiles.yml.example ]; then
            cp transform/profiles.yml.example transform/profiles.yml
          fi

      - name: dbt deps (credentialed, optional)
        if: env.HAS_DBT_CREDENTIALS == 'true'
        run: dbt deps --project-dir transform --profiles-dir transform

      - name: dbt test (credentialed, optional)
        if: env.HAS_DBT_CREDENTIALS == 'true'
        run: dbt test --project-dir transform --profiles-dir transform

      - name: Skip optional credentialed dbt steps
        if: env.HAS_DBT_CREDENTIALS != 'true'
        run: echo "GCP credentials not configured in secrets; skipping dbt deps/test."
